version: "3.9"

services:
  munkiRepo:
    image: python:3.11-alpine
    container_name: saltyfleet-munki
    volumes:
      - ./catalogs:/mnt/munki/catalogs
      - ./manifests:/mnt/munki/manifests
      - ./pkgs:/mnt/munki/pkgs
    working_dir: /mnt/munki
    command: sh -c "python3 -m http.server 8080"
    ports:
      - "8080:8080"
