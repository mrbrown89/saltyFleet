---
- name: Clone salting macOS repo
  hosts: all
  gather_facts: false

  vars:
    repo_url: "https://github.com/mrbrown89/salting-macOS.git"
    repo_branch: "main"
    repo_dest: "/Users/admin/Documents/salting-macOS"

  tasks:
    - name: Clone salting macOS repo
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: "{{ repo_branch }}"
        update: yes
        
    - name: Make bootstrap script executable
      ansible.builtin.file:
        path: "{{ repo_dest }}/bootStrap/bootStrap.sh"
        mode: '0755'
        state: file
