---
- name: Clone salting macOS repo
  hosts: all
  gather_facts: false

  vars:
    repo_url: "https://github.com/mrbrown89/saltyFleet.git"
    repo_branch: "main"
    repo_dest: "/opt/saltyFleet"

  tasks:
    - name: Clone salting macOS repo
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: "{{ repo_branch }}"
        update: yes

