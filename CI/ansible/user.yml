---
- name: Create local admin user Matt on macOS
  hosts: macs
  become: true
  gather_facts: false

  vars:
    username: Matt
    fullname: Matt
    user_shell: /bin/zsh
    user_home: /Users/Matt
    user_uid: 501   # Change if already in use
    user_gid: 20    # staff

  tasks:
    - name: Check if user already exists
      command: dscl . -read /Users/{{ username }}
      register: user_check
      failed_when: false
      changed_when: false

    - name: Create user record
      command: dscl . -create /Users/{{ username }}
      when: user_check.rc != 0

    - name: Set user attributes
      command: dscl . -create /Users/{{ username }} {{ item.key }} {{ item.value }}
      loop:
        - { key: UserShell, value: "{{ user_shell }}" }
        - { key: RealName, value: "{{ fullname }}" }
        - { key: UniqueID, value: "{{ user_uid }}" }
        - { key: PrimaryGroupID, value: "{{ user_gid }}" }
        - { key: NFSHomeDirectory, value: "{{ user_home }}" }
      when: user_check.rc != 0

    - name: Set user password
      command: dscl . -passwd /Users/{{ username }} "ChangeMeNow!"
      when: user_check.rc != 0

    - name: Create home directory
      command: createhomedir -c -u {{ username }}
      when: user_check.rc != 0

    - name: Add user to admin group
      command: dseditgroup -o edit -a {{ username }} -t user admin
      when: user_check.rc != 0
